<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em GTML5, podemos inserir os elementos da lista a seguir. Passe o mouse <br>sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul>
        <li type="square"><abbr title="Use a tag &lt;p&gt;">Parágrafo</abbr></li>
        <li type="square"><abbr title="Use a tag &lt;title&gt;">Títulos</abbr></li>
        <li type="square"><abbr title="Use a tag &lt;img&gt;">Imagens</abbr></li>
        <li type="square"><abbr title="Use a tag &lt;abbr&gt;">Abreviações</abbr></li>
        <li type="square"><abbr title="Use a tag &lt;code&gt; dentro da tag &lt;pre&gt;">Códigos-fonte</abbr></li>
        <li type="square"><abbr title="Use a tag &lt;li&gt; dentro da tag &lt;ul&gt;">Listas numeradas</abbr></li>
        <li type="square"><abbr title="Use a tag &lt;dt&gt; dentro da tag &lt;dl&gt;">Listas com demarcadores</abbr></li>
    </ul>
</body>
</html>
