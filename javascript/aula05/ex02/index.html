<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body {
            background-color: rgb(90, 161, 255);
            color: white;   /*Comentário em CSS*/
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <h1>Olá, terminou de brincar? Segue a lista de trabalho!!</h1> 
    <hr>
    <ol>
        <li>Estudar Back-end</li>
        <ul type="square">
            <li>Python</li>
            <li>Java</li>
        </ul>
        <li>Estudar Front-end</li>
        <ul type="square">
            <li>HTML/CSS</li> <!--Comentario em HTML-->
            <li>JavaScript</li>
        </ul>
    </ol>
    <script>
        let n1 = Number.parseInt(window.prompt('Digite um número: ')); // Comentario em JAVASCRIPT
        let n2 = parseInt(window.prompt('Digite outro número: '));
        let soma = parseInt(n1) + parseInt(n2);
        window.alert(`${n1} + ${n2} = ${soma}`)

    </script>
