<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let name = prompt('Nome: ')
        if (! name) {
            alert('Voce nao digitou nada!');
        }  else {
            alert(`Seja bem vindo ${name}`);
        } 
        var vel = prompt('Velocidade: ')
        if (vel >= 60) {
            alert(`Voce foi multado por andar a ${vel}KM`);
        } else {
            alert('Voce não foi multado!') 
        }
        console.log('Console ta funcionando')
    
    </script>
</body>
</html>
